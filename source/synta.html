<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Synta</title>
  <style>
    :root{
      --bg: #f4fbff;
      --panel: #eaf6fb;
      --muted: #7b98a6;
      --accent: #3aa0d9;
      --terminal: #1e90ff;
      --node: #0b6b3b;
      --line: #000000;
      --arrow: #d93025;
      --subtext: #1e90ff;
    }
    *{box-sizing:border-box;font-family:Inter,Segoe UI,Arial,sans-serif}
    body{margin:0;background:var(--bg);color:#0c2b2e}
    header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:linear-gradient(90deg,var(--panel),#ffffff);border-bottom:1px solid #dfeff4}
    header h1{margin:0;font-size:18px;color:var(--muted)}
    .toolbar button{margin-left:8px;padding:6px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);background:white;cursor:pointer}
    .toolbar-link{display:inline-block;margin-left:8px;padding:6px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);background:white;color:inherit;text-decoration:none}
    main{display:flex;gap:16px;padding:16px}
    .left{width:420px}
    .right{flex:1;position:relative}
    .tabs{display:flex;gap:6px;margin-bottom:8px}
    .tab{flex:1;padding:8px;background:transparent;border:1px solid transparent;border-radius:6px;cursor:pointer}
    .tab.active{background:var(--panel);border-color:#cfeffb}
    .editor-pane{background:var(--panel);padding:8px;border-radius:8px}
    .editor-pane.hidden{display:none}
    textarea{width:100%;height:420px;border:0;resize:none;background:transparent;font-family:ui-monospace,monospace;font-size:13px;padding:12px;color:#033;outline:none}
    .syt-toolbar{display:flex;gap:8px;margin-bottom:8px}
    .syt-toolbar button{padding:6px 10px;border-radius:6px;border:1px solid rgba(0,0,0,0.08);background:white;cursor:pointer}
    .synta-editor{position:relative;height:420px;overflow:hidden}
    #syntaGutter{position:absolute;left:0;top:0;bottom:0;width:48px;padding:12px 6px;color:var(--muted);background:transparent;border-right:1px solid rgba(0,0,0,0.03);font-family:ui-monospace,monospace;font-size:13px;line-height:1.5;text-align:right;z-index:0;pointer-events:none;white-space:pre}
    #syntaGutter::-webkit-scrollbar{display:none}
    #syntaHighlight{display:none}
    #syntaHighlight .num{color:var(--muted)}
    #syntaHighlight .ref{color:#8a4fff}
    #syntaHighlight .arrow{color:var(--arrow)}
    #syntaHighlight .star{color:var(--accent)}
    #syntaHighlight .brace{color:#0c6}
    #syntaHighlight .node{color:var(--node)}
    #syntaInput{position:absolute;inset:0;padding:12px 12px 12px 56px;border:0;resize:none;background:transparent;color:#033;-webkit-text-fill-color:#033;caret-color:#033;outline:none;font-family:ui-monospace,monospace;font-size:13px;line-height:1.5;white-space:pre;overflow:auto;z-index:1}
    #syntaInput::selection{background:rgba(30,144,255,0.18)}

    canvas{width:100%;height:700px;background:linear-gradient(180deg,#ffffff, #f7fdff);border-radius:10px;border:1px solid #e0f2f8}
    .errors{position:absolute;left:12px;top:12px;background:#fff4f4;border:1px solid #ffd2d2;padding:8px;border-radius:6px;color:#8a1b1b}
    .errors.hidden{display:none}
    footer{padding:12px 20px;color:var(--muted)}

    .node-label{font-size:12px}
  </style>
</head>
<body>
  <header>
    <h1>Synta</h1>
    <div class="toolbar">
      <button id="exportPng">Export PNG</button>
      <button id="testExportPng">Test Export</button>
      <a class="toolbar-link" href="docs.html">Docs</a>
      <button id="saveQ">Save .synta</button>
      <input id="openQ" type="file" accept=".synta,.txt" style="display:none" />
      <button id="openQBtn">Open .synta</button>
      <button id="convertBtn">Convert → Bracketed</button>
      <button id="reloadBtn">Reload (show errors)</button>
    </div>
  </header>

  <main>
    <section class="left">
      <div class="tabs">
        <button class="tab active" data-mode="bracket">Bracketed Notation</button>
        <button class="tab" data-mode="synta">.synta</button>
        <button class="tab" data-mode="syt">SYT Styling</button>
      </div>

      <div class="editors">
        <div class="editor-pane" id="bracketPane">
          <textarea id="bracketInput" spellcheck="false" placeholder="Enter bracketed notation here"></textarea>
        </div>
        <div class="editor-pane hidden" id="syntaPane">
          <div class="synta-editor">
            <div id="syntaGutter" class="synta-gutter" aria-hidden="true"></div>
            <pre id="syntaHighlight" aria-hidden="true"></pre>
            <textarea id="syntaInput" spellcheck="false" placeholder="Enter .synta lines here (gutter shows line numbers)"></textarea>
          </div>
        </div>
        <div class="editor-pane hidden" id="sytPane">
          <div class="syt-toolbar">
            <button id="renderSyt">Render</button>
            <button id="saveSyt">Save .syt</button>
            <input id="openSyt" type="file" accept=".syt,.txt" style="display:none" />
            <button id="openSytBtn">Open .syt</button>
          </div>
          <textarea id="sytInput" spellcheck="false" placeholder="Write SYT style script here"></textarea>
        </div>
      </div>
    </section>

    <section class="right">
      <canvas id="canvas" width="1200" height="700"></canvas>
      <div id="errors" class="errors hidden"></div>
    </section>
  </main>

  <footer>
    <small>Light, cool color scheme — terminals blue; nodes dark green.</small>
  </footer>

  <script src="js/syt.js"></script>
  <script src="js/synta.js"></script>
</body>
</html>
